<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-PLATINUM | Vault Publisher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #E2E8F0; 
            --bg: #94A3B8;    
            --border: 3px solid var(--black);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--black); padding: 40px 5%; }
        
        .container { max-width: 600px; margin: 0 auto; background: var(--white); border: var(--border); padding: 30px; box-shadow: 10px 10px 0 var(--black); }
        h2 { font-weight: 900; text-transform: uppercase; font-size: 2rem; margin-bottom: 20px; letter-spacing: -1px; }
        
        .tab-system { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #CBD5E1; border: var(--border); font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .tab-btn.active { background: var(--black); color: white; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 900; font-size: 0.8rem; text-transform: uppercase; }
        input, textarea { padding: 12px; border: var(--border); font-size: 1rem; font-weight: 500; width:100%; }
        
        .submit-btn { width: 100%; padding: 15px; background: #22c55e; color: var(--black); border: var(--border); font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0 var(--black); margin-top: 10px; }
        .back-link { display: inline-block; margin-top: 20px; color: var(--black); font-weight: 700; text-decoration: none; font-size: 0.9rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="lockscreen" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000000; z-index:99999; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
    <h2 style="color:#FFF; font-weight:900; margin-bottom:20px; text-transform:uppercase; font-size:1.3rem; letter-spacing:1px; text-align:center;">ENTER SYSTEM PIN</h2>
    <input type="password" id="pin-input" placeholder="••••" inputmode="numeric" pattern="[0-9]*" style="-webkit-text-security: disc; text-align:center; font-size:2.5rem; letter-spacing:5px; width:180px; padding:10px; background:#111; color:#fff; border:3px solid #fff; margin-bottom:20px; border-radius:0;">
    <button onclick="verifyMobilePin()" style="background:#fff; color:#000; font-weight:900; border:2px solid #000; padding:15px 40px; text-transform:uppercase; cursor:pointer;">VERIFY AUTH</button>
</div>

<div class="container">
    <h2>Publish to Vault</h2>
    
    <div class="tab-system">
        <button class="tab-btn active" id="tab-ann" onclick="switchTab('announcement')">Announcement</button>
        <button class="tab-btn" id="tab-res" onclick="switchTab('resources')">Notes/Links</button>
    </div>

    <form id="publisher-form">
        <div class="form-group">
            <label>Tag / Urgency Level</label>
            <input type="text" id="post-tag" placeholder="e.g., ⚠️ URGENT, 📢 REMINDER" required>
        </div>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="post-title" placeholder="e.g., Math Quiz Tomorrow" required>
        </div>
        <div class="form-group">
            <label>Content Description</label>
            <textarea id="post-body" placeholder="Write the details here..." style="min-height:100px;" required></textarea>
        </div>
        <div class="form-group">
            <label>Author Signature</label>
            <input type="text" id="post-author" placeholder="e.g., MS. OCAMPO" required>
        </div>
        <button type="submit" class="submit-btn">Publish Globally 🌐</button>
    </form>
    
    <a href="index.html" class="back-link">← Back to Bulletin Board</a>
</div>

<script>
    const SUPABASE_URL = "https://wyabsbzxcwmqmjnckwru.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_uKHKLyFSwYY54psPJsG5Sg_aIMRIbIR";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let activeType = 'announcement';

    // Verification security algorithm match verification
    function verifyMobilePin() {
        const pin = document.getElementById('pin-input').value;
        // Set this password to whatever numeric PIN you want to access from your phone!
        if (pin === "2026") { 
            document.getElementById('lockscreen').style.display = 'none';
        } else {
            alert("ACCESS DENIED.");
            window.location.href = "index.html";
        }
    }

    function switchTab(type) {
        activeType = type;
        document.getElementById('tab-ann').classList.toggle('active', type === 'announcement');
        document.getElementById('tab-res').classList.toggle('active', type === 'resources');
        
        if(type === 'resources') {
            document.getElementById('post-tag').value = "📂 MODULE";
            document.getElementById('post-title').placeholder = "e.g., Science Quarter 4 Reviewer";
        } else {
            document.getElementById('post-tag').value = "";
            document.getElementById('post-title').placeholder = "e.g., Math Quiz Tomorrow";
        }
    }

    document.getElementById('publisher-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const colorThemes = ['color-yellow', 'color-cyan', 'color-pink', 'color-green'];
        const tiltStyles = ['tilt-left', 'tilt-right', 'tilt-slight'];
        
        const randomColor = colorThemes[Math.floor(Math.random() * colorThemes.length)];
        const randomTilt = tiltStyles[Math.floor(Math.random() * tiltStyles.length)];

        const newPost = {
            tag: document.getElementById('post-tag').value,
            title: document.getElementById('post-title').value,
            body: document.getElementById('post-body').value,
            author: document.getElementById('post-author').value,
            colorClass: randomColor,
            tiltClass: randomTilt
        };

        const { error } = await supabaseClient.from('announcements').insert([newPost]);

        if (error) {
            alert("Error publishing data transaction.");
        } else {
            alert("Live Sync Complete!");
            window.location.href = "index.html"; 
        }
    });
</script>
</body>
</html>
