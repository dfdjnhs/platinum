<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-PLATINUM | The Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --white: #E2E8F0; 
            --bg: #94A3B8;    
            --border: 3px solid var(--black);
            --ease: cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); overflow-x: hidden; }
        
        .header-area {
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            padding: 30px 5%; 
            width: 100%;
            background: var(--white);
            border-bottom: var(--border);
        }
        .action-bar { display: flex; gap: 8px; }
        .admin-toggle { 
            background: var(--black); color: #fff; border: none; padding: 10px 15px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; 
            font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; 
        }

        .main-content { padding: 40px 5%; min-height: calc(100vh - 120px); }

        .bulletin-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 0;
            width: 100%;
        }

        .poster {
            background: #FFF; border: var(--border); padding: 25px;
            box-shadow: 8px 8px 0 var(--black); position: relative;
            display: flex; flex-direction: column; min-height: 320px;
            transition: transform 0.2s var(--ease);
        }
        .poster::before {
            content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 15px; height: 15px; background: #EF4444; border: 2px solid var(--black); border-radius: 50%;
        }

        .poster-tag { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; background: var(--black); color: white; padding: 3px 8px; align-self: flex-start; margin-bottom: 15px; }
        .poster-title { font-size: 1.5rem; font-weight: 900; line-height: 1.1; text-transform: uppercase; margin-bottom: 12px; }
        .poster-body { font-size: 0.95rem; line-height: 1.4; font-weight: 500; color: #333; flex-grow: 1; }
        .poster-footer { margin-top: 20px; border-top: 2px dashed var(--black); padding-top: 10px; font-size: 0.75rem; font-weight: 700; display: flex; justify-content: space-between; }

        .tilt-left { transform: rotate(-2deg); }
        .tilt-right { transform: rotate(1.5deg); }
        .tilt-slight { transform: rotate(-0.8deg); }
        .color-yellow { background-color: #FEF08A; }
        .color-cyan { background-color: #67E8F9; }
        .color-pink { background-color: #FBCFE8; }
        .color-green { background-color: #86EFAC; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header-area">
    <div>
        <h1 id="mobile-admin-trigger" style="font-weight: 900; font-size: 3.5rem; letter-spacing: -3px; line-height: 0.9; margin: 0; user-select: none; -webkit-user-select: none;">9-PLATINUM.</h1>
    </div>
    <div class="action-bar">
        <a href="add.html" class="admin-toggle" id="admin-btn" style="display: none;">+</a>
    </div>
</div>

<main class="main-content">
    <div class="bulletin-board" id="board-container">
        <p style="font-weight:700; opacity:0.5;">Loading global announcements...</p>
    </div>
</main>

<script>
const SUPABASE_URL = "https://wyabsbzxcwmqmjnckwru.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_uKHKLyFSwYY54psPJsG5Sg_aIMRIbIR";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadAnnouncements() {
    const boardContainer = document.getElementById('board-container');
    
    // Requesting data from the cloud table
    const { data, error } = await supabaseClient
        .from('announcements')
        .select('*')
        .order('id', { ascending: false });

    // IF AN ERROR OCCURS: This will tell us EXACTLY what failed
    if (error) {
        console.error(error);
        alert("Supabase Error Code: " + error.code + "\nMessage: " + error.message);
        boardContainer.innerHTML = `<p style="color:red; font-weight:700;">Database Connection Offline.<br><small>${error.message}</small></p>`;
        return;
    }

    if (data.length === 0) {
        boardContainer.innerHTML = `<p style="font-weight:700; opacity:0.5;">No announcements posted yet.</p>`;
        return;
    }

    boardContainer.innerHTML = data.map(post => `
        <div class="poster ${post.tiltClass || 'tilt-slight'} ${post.colorClass || 'color-yellow'}">
            <span class="poster-tag">${post.tag || '📢'}</span>
            <h3 class="poster-title">${post.title || ''}</h3>
            <p class="poster-body">${post.body || ''}</p>
            <div class="poster-footer">
                <span>BY: ${post.author || 'ANONYMOUS'}</span>
                <span>GLOBAL</span>
            </div>
        </div>
    `).join('');
}

// Triple-tap shortcut trigger logic
let tapCount = 0;
let tapTimer;
const trigger = document.getElementById('mobile-admin-trigger');

trigger.addEventListener('touchstart', (e) => {
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => { tapCount = 0; }, 500);

    if (tapCount === 3) {
        document.getElementById('admin-btn').style.display = 'inline-flex';
        if (navigator.vibrate) navigator.vibrate([40, 40]);
        tapCount = 0;
    }
});

document.addEventListener("DOMContentLoaded", loadAnnouncements);
</script>
</body>
</html>
